name: Preflight

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'artistic/**'
      - 'doc/**'
  push:
    branches:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'artistic/**'
      - 'doc/**'

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install formatting tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-format-17
          python3 -m pip install --user black
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check scripts and formatting
        shell: bash
        run: |
          set -euo pipefail
          bash -n .github/scripts/*.sh
          python3 - <<'PY'
          import ast
          import pathlib

          for path in sorted(pathlib.Path(".github/scripts").glob("*.py")):
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
              print(f"OK {path}")
          PY
          make lint

      - name: Check generated config restore
        shell: bash
        run: |
          set -euo pipefail
          .github/scripts/set_croc_config.sh iDMAEnable=1
          .github/scripts/set_croc_config.sh
          git diff --exit-code -- rtl/croc_pkg.sv

  smoke:
    name: Smoke simulation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Free disk space
        uses: ./.github/actions/free-space

      - name: Run local preflight in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_preflight.sh"
          log_name: preflight.log

      - name: Upload preflight artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: preflight-smoke
          if-no-files-found: ignore
          path: |
            preflight.log
            verilator/croc.log
            verilator/croc.fst
            verilator/fft-default.log
            verilator/fft-default.fst
            verilator/fft-default-bench.log
            verilator/fft-default-benchmark.csv
            verilator/fft-default-metrics.json
