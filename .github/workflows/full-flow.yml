name: Full Flow

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Short Flow"]
    types: [completed]
    branches: [main]
  release:
    types:
      - created

concurrency:
  group: full-flow-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend through sealed GDS
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Free disk space
        uses: ./.github/actions/free-space

      - name: Run full flow in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_full_flow.sh"
          log_name: full-flow.log

      - name: Upload OpenROAD artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: full-openroad
          if-no-files-found: ignore
          path: |
            full-flow.log
            openroad/out
            openroad/logs
            openroad/reports

      - name: Upload GDS
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: full-gds
          if-no-files-found: ignore
          path: klayout/out/croc.gds.gz

      - name: Upload sealed GDS
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: full-sealed-gds
          if-no-files-found: ignore
          path: klayout/out/croc.sealed.gds.gz
