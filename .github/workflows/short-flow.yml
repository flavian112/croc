name: Short Flow

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'artistic/**'
      - 'doc/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'artistic/**'
      - 'doc/**'

concurrency:
  group: short-flow-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  simulation:
    name: Simulation regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Free disk space
        uses: ./.github/actions/free-space

      - name: Run simulation flow in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_sim_flow.sh"
          log_name: short-simulation.log

      - name: Upload simulation artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: short-simulation
          if-no-files-found: ignore
          path: |
            short-simulation.log
            sw/bin
            verilator/croc.log
            verilator/croc.fst
            verilator/test_*.log

  fft-variants:
    name: FFT variant (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            verilator_flags: ''
            riscv_ccflags: ''
          - name: length8
            verilator_flags: -GFftLength=8
            riscv_ccflags: -DFFT_SYNTH_LENGTH=8 -DFFT_SYNTH_LOG2_LENGTH=3
          - name: scale-none
            verilator_flags: -GFftScalingMode=0
            riscv_ccflags: ''
          - name: inverse
            verilator_flags: -GFftInverse=1
            riscv_ccflags: -DFFT_REF_USE_INVERSE=1
          - name: rounding-saturation
            verilator_flags: -GFftUseRounding=1 -GFftUseSaturation=1
            riscv_ccflags: -DFFT_REF_USE_ROUNDING=1 -DFFT_REF_USE_SATURATION=1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Free disk space
        uses: ./.github/actions/free-space

      - name: Run FFT variant in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          log_name: fft-${{ matrix.name }}.log
          cmd: >-
            .github/scripts/run_fft_variant.sh
            '${{ matrix.name }}'
            '${{ matrix.verilator_flags }}'
            '${{ matrix.riscv_ccflags }}'

      - name: Check FFT variant metrics
        shell: bash
        run: >-
          python3 .github/scripts/check_metrics.py variant
          --variant '${{ matrix.name }}'
          --baseline .github/metrics/baseline.json
          --metrics 'verilator/fft-${{ matrix.name }}-metrics.json'

      - name: Upload FFT variant artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: short-fft-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            fft-${{ matrix.name }}.log
            verilator/croc.log
            verilator/croc.fst
            verilator/fft-${{ matrix.name }}.log
            verilator/fft-${{ matrix.name }}.fst
            verilator/fft-${{ matrix.name }}-bench.log
            verilator/fft-${{ matrix.name }}-benchmark.csv
            verilator/fft-${{ matrix.name }}-metrics.json

  synthesis:
    name: Synthesis regression
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Free disk space
        uses: ./.github/actions/free-space

      - name: Run synthesis flow in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_synth_flow.sh"
          log_name: short-synthesis.log

      - name: Check synthesis metrics
        shell: bash
        run: >-
          python3 .github/scripts/check_metrics.py synth
          --config default
          --baseline .github/metrics/baseline.json
          --metrics yosys/reports/croc_metrics.json

      - name: Upload synthesis artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: short-synthesis
          if-no-files-found: ignore
          path: |
            short-synthesis.log
            yosys/reports
            yosys/out
