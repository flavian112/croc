name: Short Flow

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'artistic/**'
      - 'doc/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'artistic/**'
      - 'doc/**'

concurrency:
  group: short-flow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Free disk space
        uses: ./.github/actions/free-space
      - name: Run simulation flow in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_sim_flow.sh"
      - name: Upload built software
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-sw
          path: sw/bin
      - name: Upload simulation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-simulation-output
          path: |
            verilator/croc.fst
            verilator/croc.log
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-test-logs
          path: verilator/test_*.log

  synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Free disk space
        uses: ./.github/actions/free-space
      - name: Run synthesis flow in OSEDA
        uses: ./.github/actions/oseda-cmd
        with:
          cmd: ".github/scripts/run_synth_flow.sh"
      - name: Upload synthesis outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-flow-synth-reports
          path: |
            yosys/reports
            yosys/out
