name: 'OSEDA Command Action'
description: 'Sets up OSEDA environment and runs commands in a Docker container'

inputs:
  cmd:
    description: 'Command to run in the OSEDA container'
    required: true
  service_name:
    description: 'Name of the Docker service (default: from ./docker-compose.yml)'
    required: false
    default: ''
  log_name:
    description: 'File used to tee command output'
    required: false
    default: 'result.log'

runs:
  using: 'composite'
  steps:
    - name: Configure Docker user
      shell: bash
      run: |
        set -euo pipefail
        echo "UID=$(id -u)" >> "$GITHUB_ENV"
        echo "GID=$(id -g)" >> "$GITHUB_ENV"

    - name: Resolve Docker service
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.service_name }}" ]]; then
          service_name="${{ inputs.service_name }}"
        else
          service_name="$(docker compose config --services | head -n 1)"
        fi
        if [[ -z "$service_name" ]]; then
          echo "[ERROR] No service found in docker-compose.yml" >&2
          exit 1
        fi
        echo "service_name=$service_name" >> "$GITHUB_ENV"

    - name: Pull Docker image
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::docker compose pull"
        docker compose pull
        echo "::endgroup::"

    - name: Run commands in OSEDA container
      shell: bash
      run: |
        set -euo pipefail
        log_name="${{ inputs.log_name }}"
        echo "::group::OSEDA: ${{ inputs.cmd }}"
        docker compose run --rm -T --no-deps --pull=never "${{ env.service_name }}" \
          --skip bash -lc "source ~/.bashrc; ${{ inputs.cmd }}" 2>&1 | tee "$log_name"
        status="${PIPESTATUS[0]}"
        echo "::endgroup::"
        echo "result_log=$(pwd)/$log_name" >> "$GITHUB_ENV"
        exit "$status"
